<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
     body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: cyan;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
}

h1 {
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    margin-bottom: 20px;
}
</style>
<body>
     <h1>Toggle Paragraph Example</h1>
    <button id="btn">Toggle</button>
    <p id="para">This is Sample Paragraph.Click button to hide/show me!</p>
    <script>
        const btn = document.getElementById("btn");
        const para = document.getElementById("para");

        btn.addEventListener("click",()=>{
            para.classList.toggle("hide");
        })
    </script>
</body>
</html>
