<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Dashboard</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2 class="logo">GYM<span>PRO</span></h2>

      <ul>
        <li class="tab active" data-tab="overview">
          <i class="fa-solid fa-house"></i>
          Overview
        </li>

        <li class="tab" data-tab="analytics">
          <i class="fa-solid fa-chart-line"></i>
          Analytics
        </li>

        <li class="tab" data-tab="settings">
          <i class="fa-solid fa-gear"></i>
          Settings
        </li>
      </ul>
    </aside>


    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- OVERVIEW -->
      <section id="overview" class="content active-section">

        <div class="top-bar">
          <h1>Welcome Back, Aman 👋</h1>
        </div>

        <div class="cards">

          <div class="card glow">
            <div>
              <h3>Active Plan</h3>
              <p>Gold Membership</p>
            </div>
            <i class="fa-solid fa-crown"></i>
          </div>

          <div class="card glow">
            <div>
              <h3>Membership Expiry</h3>
              <p>25 May 2026</p>
            </div>
            <i class="fa-solid fa-calendar"></i>
          </div>

          <div class="card glow">
            <div>
              <h3>Total Sessions</h3>
              <p id="sessions">48</p>
            </div>
            <i class="fa-solid fa-dumbbell"></i>
          </div>

          <div class="card glow">
            <div>
              <h3>Reward Points</h3>
              <p id="points">1200</p>
            </div>
            <i class="fa-solid fa-star"></i>
          </div>

        </div>


        <div class="quick-actions">
          <button>Book Session</button>
          <button>Upgrade Plan</button>
          <button>View Trainers</button>
        </div>

      </section>


      <!-- ANALYTICS -->
      <section id="analytics" class="content">

        <div class="chart-controls">
          <button class="data-btn active-data" data-type="weekly">Weekly</button>
          <button class="data-btn" data-type="monthly">Monthly</button>
          <button class="data-btn" data-type="yearly">Yearly</button>
        </div>


        <div class="chart-grid">

          <div class="chart-card">
            <h2>Workout Activity</h2>
            <canvas id="lineChart"></canvas>
          </div>

          <div class="chart-card">
            <h2>Membership Usage</h2>
            <canvas id="doughnutChart"></canvas>
          </div>

        </div>

      </section>


      <!-- SETTINGS -->
      <section id="settings" class="content">

        <div class="settings-card">
          <h2>Settings</h2>

          <div class="setting-row">
            <span>Notifications</span>
            <input type="checkbox" checked />
          </div>

          <div class="setting-row">
            <span>Dark Mode</span>
            <button id="themeToggle">Toggle Theme</button>
          </div>

          <div class="setting-row">
            <span>Profile</span>
            <button>Edit</button>
          </div>

          <button class="logout-btn">Logout</button>

        </div>

      </section>

    </main>

  </div>


  <script src="app.js"></script>

</body>

</html>
