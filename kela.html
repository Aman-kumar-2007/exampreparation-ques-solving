<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: cyan;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
}

h1 {
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    margin-bottom: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    background: cyan;
    color: black;
    border-radius: 6px;
    cursor: pointer;
}
</style>
<body>

    <div class="container">
        <h1>💬 Quote Generator</h1>

        <p id="quote">Click the button to generate a quote!</p>

        <button onclick="generateQuote()">New Quote</button>
    </div>
    
</body>
</html>
