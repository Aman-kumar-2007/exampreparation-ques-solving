<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="main-sec">
        <input type="text" id="string">
        <button id="btn">Click</button>
    </div>
    <p id="para" style="display: none;">It is Palindrome !!</p>

    <script>
        const btn = document.getElementById("btn");
        const text = document.getElementById("string");
        const para = document.getElementById("para");

        btn.addEventListener("click", () => {
            let sentence = text.value.toLowerCase().replace(/\s+/g, "");

            let l = 0;
            let r = sentence.length - 1;
            let found = true;

            while (l < r) {
                if (sentence[l] !== sentence[r]) {
                    found = false;
                    break;
                }
                r++;
                l--;
            }

            if (found) {
                para.style.display = "block";
                para.innerText = "It is Palindrome";
            }
            else {
                para.style.display = "block";
                para.innerText = "It is not Palindrome";
            }
        })
    </script>
</body>

</html>
