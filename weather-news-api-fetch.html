<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>

</head>
<style>
    #city-error{
        display: none;
    }
</style>

<body>

    <main>
        <div class="weather-card">
            <div class="upper">
                <input type="text" id="weatherCity" placeholder="Enter city Name...">
                <button id="weather-btn">Check Weather</button>
            </div>
            <h1 id="city-error">City not Found</h1>

            <div class="lower">
                <h2 id="Temp">Temp : 0&deg; C</h2>
                <h2 id="windSpeed">Wind Speed : 0km/hr</h2>
            </div>
        </div>
    </main>


    <script>

        async function getWeather(city) {

            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);

            const locData = await res.json();

            if (!locData.results) {
                console.log("City not found");
                return;
            }

            const lat = locData.results[0].latitude;
            const lon = locData.results[0].longitude;



            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const weatherData = await weatherRes.json();

            console.log(weatherData);

            return weatherData;
        }

        document.getElementById("weather-btn").addEventListener("click", async () => {

            const city = document.getElementById("weatherCity").value.toLowerCase();

            let obj = await getWeather(city);

            console.log(obj.current_weather.temperature);



        })

        getWeather("delhi");

        



    </script>
</body>

</html>
