<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>

</head>
<style>
    #city-error {
        display: none;
    }


</style>

<body>

    <main>
        <div class="weather-card">
            <div class="upper">
                <input type="text" id="weatherCity" placeholder="Enter city Name...">
                <button id="weather-btn">Check Weather</button>
            </div>
            <h1 id="city-error">City not Found</h1>

            <div class="lower">
                <h2 id="temp">Temp : 0&deg; C</h2>
                <h2 id="windSpeed">Wind Speed : 0km/hr</h2>
            </div>
        </div>

        <div class="news-section">
            <div class="upper-news">
                <input type="text" id="newsCategory" placeholder="Enter keywords...">
                <button id="news-btn">Seach News</button>
            </div>

            <div class="news-card">
                <div class="img-sec">
                    <img src="" alt="image" id="img-news">
                </div>
                <div class="news-card-details">
                    <h4 id="source">AaIYOOO</h4>
                    <h3 id="title">Hello JII</h3>
                    <p id="description">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Corrupti enim ab ad deserunt quam perferendis, ut nobis quia reiciendis facere?</p>
                </div>
                <hr>
                <div class="news-card-bottom">
                    <p id="date"></p>
                    <a href="">Read more</a>
                </div>
            </div>
        </div>
    </main>


    <script>

        async function getWeather(city) {

            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);

            const locData = await res.json();

            if (!locData.results) {
                console.log("City not found");
                // document.getElementById("city-error").style.display = "block";
                // document.querySelector('.lower').style.display = "none";
                return;
            }

            const lat = locData.results[0].latitude;
            const lon = locData.results[0].longitude;



            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const weatherData = await weatherRes.json();

            console.log(weatherData);
            return weatherData;
        }

        document.getElementById("weather-btn").addEventListener("click", async (e) => {
            e.preventDefault();
            const city = document.getElementById("weatherCity").value.toLowerCase();

            let obj = await getWeather(city);

            console.log(obj.current_weather.temperature);

            document.getElementById("temp").innerText = `Temp : ${obj.current_weather.temperature}° C`
            document.getElementById("windSpeed").innerText = `Wind Speed : ${obj.current_weather.windspeed} km/hr`

        })

        const API_KEY = "6853a4c4a5c1518b55a4600dd0c750a6";


        async function getNews(category) {
            const newsUrl = `https://gnews.io/api/v4/top-headlines?category=${category}&lang=en&country=in&apikey=${API_KEY}`;

            const res = await fetch(newsUrl);

            const newsData = await res.json();

            console.log(newsData.articles);
            return newsData.articles;
        }

        document.getElementById("news-btn").addEventListener("click",async (e)=>{
            e.preventDefault();
            const category = document.getElementById("newsCategory").value.toLowerCase();

            let obj = await getNews(category);

            document.getElementById("title").textContent = `${obj[0].title}`;
            document.getElementById("source").textContent = `${obj[0].source.name}`;
            document.getElementById("description").textContent = `${obj[0].description}`;
            document.getElementById("date").textContent = `${obj[0].publishedAt}`;
            document.getElementById("img-news").src = obj[0].image;

        });







    </script>
</body>

</html>
